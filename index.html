<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everyday Calculator - Free Online Calculator</title>
    <meta name="description" content="Everyday Calculator is a free online calculator. Perform quick calculations with history tracking right in your browser.">
    <meta name="keywords" content="online calculator, free calculator, everyday calculator, simple calculator, calculator with history">
    <meta name="author" content="swetha-latha1">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://swetha-latha1.github.io/calculator-project/">
    <meta property="og:title" content="Everyday Calculator - Free Online Calculator">
    <meta property="og:description" content="Free online calculator with calculation history. Fast, simple and easy to use.">
    <meta property="og:url" content="https://swetha-latha1.github.io/calculator-project/">
    <meta property="og:type" content="website">
    <style>
        :root {
            --panel: #18212f;
            --screen: #f9fafb;
            --screen-text: #121826;
            --muted: #667085;
            --key: #ffffff;
            --key-hover: #eef2f6;
            --ink: #1f2937;
            --border: #d8dee8;
            --accent: #2563eb;
            --accent-dark: #1d4ed8;
            --operator: #f97316;
            --operator-dark: #ea580c;
            --success: #15803d;
            --danger: #dc2626;
            --shadow: 0 22px 60px rgba(25, 32, 44, 0.18);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
            background: linear-gradient(135deg, #f4efe7 0%, #e8f0f3 52%, #f7dfd3 100%);
            color: var(--ink);
            font-family: "Segoe UI", Arial, sans-serif;
        }
        .app {
            width: min(960px, 100%);
            display: grid;
            grid-template-columns: minmax(320px, 420px) minmax(260px, 1fr);
            gap: 22px;
            align-items: stretch;
        }
        .calculator,
        .history {
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .calculator {
            background: var(--panel);
            border-radius: 24px;
            padding: 22px;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }
        h1 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
        }
        .history-button {
            display: none;
            width: 46px;
            height: 46px;
            border: 0;
            border-radius: 14px;
            background: var(--accent);
            color: #ffffff;
            font-size: 22px;
            cursor: pointer;
        }
        .screen {
            min-height: 128px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 8px;
            padding: 18px;
            margin-bottom: 18px;
            border-radius: 18px;
            background: var(--screen);
            border: 1px solid #edf0f5;
        }
        .previous {
            min-height: 22px;
            color: var(--muted);
            text-align: right;
            font-size: 15px;
            overflow-wrap: anywhere;
        }
        #display {
            width: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--screen-text);
            text-align: right;
            font-size: clamp(34px, 8vw, 48px);
            font-weight: 700;
        }
        .keys {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }
        button {
            min-width: 0;
            height: 64px;
            border: 0;
            border-radius: 16px;
            font: inherit;
            font-size: 23px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(10, 15, 25, 0.15);
        }
        button:active {
            transform: translateY(0);
            box-shadow: none;
        }
        .key {
            background: var(--key);
            color: var(--ink);
        }
        .key:hover {
            background: var(--key-hover);
        }
        .action {
            background: #e8eef9;
            color: var(--accent-dark);
        }
        .operator {
            background: var(--operator);
            color: #ffffff;
        }
        .operator:hover {
            background: var(--operator-dark);
        }
        .equals {
            background: var(--success);
            color: #ffffff;
        }
        .clear {
            background: var(--danger);
            color: #ffffff;
        }
        .zero {
            grid-column: span 2;
        }
        .history {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            border-radius: 24px;
            background: #ffffff;
            overflow: hidden;
        }
        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        .history-header h2 {
            font-size: 20px;
            line-height: 1.2;
        }
        .close-history {
            display: none;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: #edf2f7;
            color: #111827;
            font-size: 20px;
        }
        .history-list {
            flex: 1;
            list-style: none;
            padding: 14px;
            overflow-y: auto;
        }
        .history-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 13px 14px;
            margin-bottom: 10px;
            border: 1px solid #e5eaf1;
            border-radius: 14px;
            background: #f8fafc;
            color: #1f2937;
            cursor: pointer;
            overflow-wrap: anywhere;
        }
        .history-list li:hover {
            background: #eef6ff;
            border-color: #c9ddff;
        }
        .history-text {
            flex: 1;
        }
        .delete-item {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            min-width: 0;
            border-radius: 8px;
            background: #fff1f2;
            color: #be123c;
            font-size: 16px;
            font-weight: 700;
            display: grid;
            place-items: center;
            transition: background 140ms ease;
        }
        .delete-item:hover {
            background: #fecdd3;
            transform: none;
            box-shadow: none;
        }
        .empty-history {
            padding: 24px 18px;
            color: var(--muted);
            text-align: center;
            line-height: 1.5;
        }
        .clear-history {
            height: 50px;
            margin: 0 14px 14px;
            border-radius: 14px;
            background: #fff1f2;
            color: #be123c;
            font-size: 16px;
        }
        @media (max-width: 760px) {
            body { padding: 18px; }
            .app { grid-template-columns: 1fr; }
            .calculator { border-radius: 22px; padding: 18px; }
            .history-button,
            .close-history { display: inline-grid; place-items: center; }
            .history {
                position: fixed;
                inset: 18px;
                z-index: 10;
                min-height: auto;
                transform: translateY(calc(100% + 40px));
                transition: transform 200ms ease;
            }
            .history.open { transform: translateY(0); }
            button { height: 60px; border-radius: 14px; }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="calculator" aria-label="Calculator">
            <div class="top-bar">
                <h1>Calculator</h1>
                <button class="history-button" type="button" onclick="toggleHistory()">☰</button>
            </div>
            <div class="screen">
                <div class="previous" id="previousCalculation"></div>
                <input id="display" type="text" value="0" readonly>
            </div>
            <div class="keys">
                <button class="clear"    type="button" onclick="clearDisplay()">C</button>
                <button class="action"   type="button" onclick="deleteLast()">⌫</button>
                <button class="action"   type="button" onclick="addValue('%')">%</button>
                <button class="operator" type="button" onclick="addValue('/')">÷</button>
                <button class="key"      type="button" onclick="addValue('7')">7</button>
                <button class="key"      type="button" onclick="addValue('8')">8</button>
                <button class="key"      type="button" onclick="addValue('9')">9</button>
                <button class="operator" type="button" onclick="addValue('*')">×</button>
                <button class="key"      type="button" onclick="addValue('4')">4</button>
                <button class="key"      type="button" onclick="addValue('5')">5</button>
                <button class="key"      type="button" onclick="addValue('6')">6</button>
                <button class="operator" type="button" onclick="addValue('-')">−</button>
                <button class="key"      type="button" onclick="addValue('1')">1</button>
                <button class="key"      type="button" onclick="addValue('2')">2</button>
                <button class="key"      type="button" onclick="addValue('3')">3</button>
                <button class="operator" type="button" onclick="addValue('+')">+</button>
                <button class="key zero" type="button" onclick="addValue('0')">0</button>
                <button class="key"      type="button" onclick="addValue('.')">.</button>
                <button class="equals"   type="button" onclick="calculate()">=</button>
            </div>
        </section>
        <aside class="history" id="historyPanel">
            <div class="history-header">
                <h2>History</h2>
                <button class="close-history" type="button" onclick="toggleHistory()">×</button>
            </div>
            <ul class="history-list" id="historyList"></ul>
            <button class="clear-history" type="button" onclick="clearHistory()">Clear history</button>
        </aside>
    </main>
    <script>
        var display = document.getElementById("display");
        var prevLine = document.getElementById("previousCalculation");
        var historyPanel = document.getElementById("historyPanel");
        var historyList = document.getElementById("historyList");
        var freshResult = false;
        var calcHistory = JSON.parse(localStorage.getItem("calcHistory") || "[]");

        renderHistory();

        function addValue(val) {
            var cur = display.value;
            var ops = ["+", "-", "*", "/", "%"];

            if (cur === "Error" || (freshResult && ops.indexOf(val) === -1)) {
                display.value = "";
                cur = "";
            }
            freshResult = false;

            if (display.value === "0" && val !== ".") {
                display.value = "";
                cur = "";
            }

            var last = display.value.slice(-1);
            if (ops.indexOf(val) !== -1 && ops.indexOf(last) !== -1) {
                display.value = display.value.slice(0, -1) + val;
                return;
            }

            if (val === ".") {
                var parts = display.value.split(/[+\-*/%]/);
                var lastPart = parts[parts.length - 1];
                if (lastPart.indexOf(".") !== -1) return;
            }

            display.value += val;
        }

        function clearDisplay() {
            display.value = "0";
            prevLine.textContent = "";
            freshResult = false;
        }

        function deleteLast() {
            if (display.value === "Error" || display.value.length <= 1) {
                clearDisplay();
                return;
            }
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            var expr = display.value;
            if (expr === "" || expr === "Error") return;

            try {
                var result = Function("return (" + expr + ")")();
                if (typeof result !== "number" || !isFinite(result)) {
                    throw new Error("bad result");
                }
                var neat = Math.round(result * 1e10) / 1e10;
                prevLine.textContent = niceExpr(expr) + " =";
                display.value = neat;
                freshResult = true;
                saveToHistory(expr, neat);
            } catch (e) {
                display.value = "Error";
                freshResult = true;
            }
        }

        function niceExpr(expr) {
            return expr.replace(/\*/g, "×").replace(/\//g, "÷");
        }

        function saveToHistory(expr, result) {
            calcHistory.unshift({ expr: niceExpr(expr), result: result });
            calcHistory = calcHistory.slice(0, 12);
            localStorage.setItem("calcHistory", JSON.stringify(calcHistory));
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = "";
            if (calcHistory.length === 0) {
                var li = document.createElement("li");
                li.className = "empty-history";
                li.textContent = "No calculations yet.";
                historyList.appendChild(li);
                return;
            }
            for (var i = 0; i < calcHistory.length; i++) {
                buildRow(i);
            }
        }

        function buildRow(index) {
            var entry = calcHistory[index];
            var li = document.createElement("li");
            var span = document.createElement("span");
            var btn = document.createElement("button");

            span.className = "history-text";
            span.textContent = entry.expr + " = " + entry.result;
            span.onclick = (function(i) {
                return function() {
                    display.value = calcHistory[i].result;
                    prevLine.textContent = calcHistory[i].expr + " =";
                    freshResult = true;
                };
            })(index);

            btn.className = "delete-item";
            btn.type = "button";
            btn.textContent = "×";
            btn.onclick = (function(i) {
                return function(e) {
                    e.stopPropagation();
                    calcHistory.splice(i, 1);
                    localStorage.setItem("calcHistory", JSON.stringify(calcHistory));
                    renderHistory();
                };
            })(index);

            li.appendChild(span);
            li.appendChild(btn);
            historyList.appendChild(li);
        }

        function clearHistory() {
            calcHistory = [];
            localStorage.removeItem("calcHistory");
            renderHistory();
        }

        function toggleHistory() {
            historyPanel.classList.toggle("open");
        }

        document.addEventListener("keydown", function(e) {
            if (/^[0-9+\-*/%.]$/.test(e.key)) {
                addValue(e.key);
            } else if (e.key === "Enter") {
                e.preventDefault();
                calculate();
            } else if (e.key === "Backspace") {
                deleteLast();
            } else if (e.key === "Escape") {
                clearDisplay();
            }
        });
    </script>
</body>
</html>

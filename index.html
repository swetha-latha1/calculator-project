<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everyday Calculator</title>
    <style>
        :root {
            --page: #f4efe7;
            --panel: #18212f;
            --screen: #f9fafb;
            --screen-text: #121826;
            --muted: #667085;
            --key: #ffffff;
            --key-hover: #eef2f6;
            --ink: #1f2937;
            --border: #d8dee8;
            --accent: #2563eb;
            --accent-dark: #1d4ed8;
            --operator: #f97316;
            --operator-dark: #ea580c;
            --success: #15803d;
            --danger: #dc2626;
            --shadow: 0 22px 60px rgba(25, 32, 44, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
            background:
                linear-gradient(135deg, #f4efe7 0%, #e8f0f3 52%, #f7dfd3 100%);
            color: var(--ink);
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .app {
            width: min(960px, 100%);
            display: grid;
            grid-template-columns: minmax(320px, 420px) minmax(260px, 1fr);
            gap: 22px;
            align-items: stretch;
        }

        .calculator,
        .history {
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .calculator {
            background: var(--panel);
            border-radius: 24px;
            padding: 22px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .history-button {
            display: none;
            width: 46px;
            height: 46px;
            border: 0;
            border-radius: 14px;
            background: var(--accent);
            color: #ffffff;
            font-size: 22px;
            cursor: pointer;
        }

        .screen {
            min-height: 128px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 8px;
            padding: 18px;
            margin-bottom: 18px;
            border-radius: 18px;
            background: var(--screen);
            border: 1px solid #edf0f5;
        }

        .previous {
            min-height: 22px;
            color: var(--muted);
            text-align: right;
            font-size: 15px;
            overflow-wrap: anywhere;
        }

        #display {
            width: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--screen-text);
            text-align: right;
            font-size: clamp(34px, 8vw, 48px);
            font-weight: 750;
        }

        .keys {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        button {
            min-width: 0;
            height: 64px;
            border: 0;
            border-radius: 16px;
            font: inherit;
            font-size: 23px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(10, 15, 25, 0.15);
        }

        button:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .key {
            background: var(--key);
            color: var(--ink);
        }

        .key:hover {
            background: var(--key-hover);
        }

        .action {
            background: #e8eef9;
            color: var(--accent-dark);
        }

        .operator {
            background: var(--operator);
            color: #ffffff;
        }

        .operator:hover {
            background: var(--operator-dark);
        }

        .equals {
            background: var(--success);
            color: #ffffff;
        }

        .clear {
            background: var(--danger);
            color: #ffffff;
        }

        .zero {
            grid-column: span 2;
        }

        .history {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            border-radius: 24px;
            background: #ffffff;
            overflow: hidden;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .history-header h2 {
            font-size: 20px;
            line-height: 1.2;
        }

        .close-history {
            display: none;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: #edf2f7;
            color: #111827;
            font-size: 20px;
        }

        .history-list {
            flex: 1;
            list-style: none;
            padding: 14px;
            overflow-y: auto;
        }

        .history-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 13px 14px;
            margin-bottom: 10px;
            border: 1px solid #e5eaf1;
            border-radius: 14px;
            background: #f8fafc;
            color: #1f2937;
            cursor: pointer;
            overflow-wrap: anywhere;
        }

        .history-list li:hover {
            background: #eef6ff;
            border-color: #c9ddff;
        }

        .delete-item {
            flex-shrink: 0;
            width: 26px;
            height: 26px;
            min-width: 0;
            border-radius: 8px;
            background: #fff1f2;
            color: #be123c;
            font-size: 14px;
            font-weight: 700;
            line-height: 1;
            display: grid;
            place-items: center;
            transition: background 140ms ease;
        }

        .delete-item:hover {
            background: #fecdd3;
            transform: none;
            box-shadow: none;
        }

        .empty-history {
            padding: 24px 18px;
            color: var(--muted);
            text-align: center;
            line-height: 1.5;
        }

        .clear-history {
            height: 50px;
            margin: 0 14px 14px;
            border-radius: 14px;
            background: #fff1f2;
            color: #be123c;
            font-size: 16px;
        }

        @media (max-width: 760px) {
            body {
                padding: 18px;
            }

            .app {
                grid-template-columns: 1fr;
            }

            .calculator {
                border-radius: 22px;
                padding: 18px;
            }

            .history-button,
            .close-history {
                display: inline-grid;
                place-items: center;
            }

            .history {
                position: fixed;
                inset: 18px;
                z-index: 10;
                min-height: auto;
                transform: translateY(calc(100% + 40px));
                transition: transform 200ms ease;
            }

            .history.open {
                transform: translateY(0);
            }

            button {
                height: 60px;
                border-radius: 14px;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="calculator" aria-label="Calculator">
            <div class="top-bar">
                <h1>Calculator</h1>
                <button class="history-button" type="button" aria-label="Open history" onclick="toggleHistory()">☰</button>
            </div>

            <div class="screen">
                <div class="previous" id="previousCalculation"></div>
                <input id="display" type="text" value="0" readonly aria-label="Current calculation">
            </div>

            <div class="keys">
                <button class="clear" type="button" onclick="clearDisplay()">C</button>
                <button class="action" type="button" onclick="deleteLastValue()">⌫</button>
                <button class="action" type="button" onclick="addValue('%')">%</button>
                <button class="operator" type="button" onclick="addValue('/')">÷</button>

                <button class="key" type="button" onclick="addValue('7')">7</button>
                <button class="key" type="button" onclick="addValue('8')">8</button>
                <button class="key" type="button" onclick="addValue('9')">9</button>
                <button class="operator" type="button" onclick="addValue('*')">×</button>

                <button class="key" type="button" onclick="addValue('4')">4</button>
                <button class="key" type="button" onclick="addValue('5')">5</button>
                <button class="key" type="button" onclick="addValue('6')">6</button>
                <button class="operator" type="button" onclick="addValue('-')">−</button>

                <button class="key" type="button" onclick="addValue('1')">1</button>
                <button class="key" type="button" onclick="addValue('2')">2</button>
                <button class="key" type="button" onclick="addValue('3')">3</button>
                <button class="operator" type="button" onclick="addValue('+')">+</button>

                <button class="key zero" type="button" onclick="addValue('0')">0</button>
                <button class="key" type="button" onclick="addValue('.')">.</button>
                <button class="equals" type="button" onclick="calculateAnswer()">=</button>
            </div>
        </section>

        <aside class="history" id="historyPanel" aria-label="Calculation history">
            <div class="history-header">
                <h2>History</h2>
                <button class="close-history" type="button" aria-label="Close history" onclick="toggleHistory()">×</button>
            </div>
            <ul class="history-list" id="historyList"></ul>
            <button class="clear-history" type="button" onclick="clearHistory()">Clear history</button>
        </aside>
    </main>

    <script>
        const display = document.getElementById("display");
        const previousCalculation = document.getElementById("previousCalculation");
        const historyPanel = document.getElementById("historyPanel");
        const historyList = document.getElementById("historyList");

        let justCalculated = false;
        let history = JSON.parse(localStorage.getItem("calculatorHistory") || "[]");

        renderHistory();

        function addValue(value) {
            const current = display.value;
            const last = current.slice(-1);
            const operators = ["+", "-", "*", "/", "%"];

            if (current === "Error" || justCalculated && !operators.includes(value)) {
                display.value = "";
            }

            justCalculated = false;

            if (display.value === "0" && value !== ".") {
                display.value = "";
            }

            if (operators.includes(value) && operators.includes(last)) {
                display.value = current.slice(0, -1) + value;
                return;
            }

            if (value === "." && current.split(/[+\-*/%]/).pop().includes(".")) {
                return;
            }

            display.value += value;
        }

        function clearDisplay() {
            display.value = "0";
            previousCalculation.textContent = "";
            justCalculated = false;
        }

        function deleteLastValue() {
            if (display.value === "Error" || display.value.length <= 1) {
                clearDisplay();
                return;
            }

            display.value = display.value.slice(0, -1);
        }

        function calculateAnswer() {
            const expression = display.value;

            try {
                const answer = solveExpression(expression);
                const neatAnswer = Number.isInteger(answer) ? answer : Number(answer.toFixed(8));

                previousCalculation.textContent = `${formatExpression(expression)} =`;
                display.value = neatAnswer;
                justCalculated = true;
                saveHistory(expression, neatAnswer);
            } catch {
                display.value = "Error";
                justCalculated = true;
            }
        }

        function solveExpression(expression) {
            const clean = expression.replace(/\s/g, "");

            if (!/^-?\d*\.?\d+([+\-*/%]\d*\.?\d+)*$/.test(clean)) {
                throw new Error("Invalid expression");
            }

            const tokens = tokenize(clean);
            const values = [];
            const operators = [];

            tokens.forEach((token) => {
                if (!Number.isNaN(Number(token))) {
                    values.push(Number(token));
                    return;
                }

                while (operators.length && priority(operators.at(-1)) >= priority(token)) {
                    values.push(applyOperator(operators.pop(), values.pop(), values.pop()));
                }

                operators.push(token);
            });

            while (operators.length) {
                values.push(applyOperator(operators.pop(), values.pop(), values.pop()));
            }

            if (!Number.isFinite(values[0])) {
                throw new Error("Invalid result");
            }

            return values[0];
        }

        function tokenize(expression) {
            const tokens = [];
            let number = "";

            for (let index = 0; index < expression.length; index += 1) {
                const character = expression[index];
                const previous = tokens[tokens.length - 1];
                const isNegativeNumber = character === "-" && !number && (!previous || "+-*/%".includes(previous));

                if (/\d|\./.test(character) || isNegativeNumber) {
                    number += character;
                    continue;
                }

                if (number) {
                    tokens.push(number);
                    number = "";
                }

                tokens.push(character);
            }

            if (number) {
                tokens.push(number);
            }

            return tokens;
        }

        function priority(operator) {
            return operator === "+" || operator === "-" ? 1 : 2;
        }

        function applyOperator(operator, right, left) {
            if (operator === "+") return left + right;
            if (operator === "-") return left - right;
            if (operator === "*") return left * right;
            if (operator === "/") return left / right;
            return left % right;
        }

        function saveHistory(expression, answer) {
            history.unshift({
                expression: formatExpression(expression),
                answer
            });

            history = history.slice(0, 12);
            localStorage.setItem("calculatorHistory", JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = "";

            if (!history.length) {
                const emptyItem = document.createElement("li");
                emptyItem.className = "empty-history";
                emptyItem.textContent = "No calculations yet.";
                historyList.appendChild(emptyItem);
                return;
            }

            history.forEach((item, index) => {
                const historyItem = document.createElement("li");

                const label = document.createElement("span");
                label.textContent = `${item.expression} = ${item.answer}`;
                label.style.flex = "1";
                label.onclick = () => {
                    display.value = item.answer;
                    previousCalculation.textContent = `${item.expression} =`;
                    justCalculated = true;
                };

                const deleteBtn = document.createElement("button");
                deleteBtn.className = "delete-item";
                deleteBtn.type = "button";
                deleteBtn.setAttribute("aria-label", "Delete this entry");
                deleteBtn.textContent = "×";
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteHistory(index);
                };

                historyItem.appendChild(label);
                historyItem.appendChild(deleteBtn);
                historyList.appendChild(historyItem);
            });
        }

        function deleteHistory(index) {
            history.splice(index, 1);
            localStorage.setItem("calculatorHistory", JSON.stringify(history));
            renderHistory();
        }

        function clearHistory() {
            history = [];
            localStorage.removeItem("calculatorHistory");
            renderHistory();
        }

        function toggleHistory() {
            historyPanel.classList.toggle("open");
        }

        function formatExpression(expression) {
            return expression
                .replace(/\*/g, "×")
                .replace(/\//g, "÷");
        }

        document.addEventListener("keydown", (event) => {
            const key = event.key;

            if (/^[0-9+\-*/%.]$/.test(key)) {
                addValue(key);
            } else if (key === "Enter") {
                event.preventDefault();
                calculateAnswer();
            } else if (key === "Backspace") {
                deleteLastValue();
            } else if (key === "Escape") {
                clearDisplay();
            }
        });
    </script>
</body>
</html>
